fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;
fade-delta = 8

animations = (
	{
	triggers = ["open"]
	preset = "appear"
	duration = 0.22;
	},

	{
	triggers = ["close"];
	preset = "disappear";
	duration = 0.07;
	},

	{
	triggers = ["geometry"];
	preset = "geometry-change";
	duration = 0.2;
	},
)

inactive-opacity = 0.5
frame-opacity = 1;
focus-exclude = "x = 0 && y = 0 && override_redirect = true";

unredir-if-possible = false;

blur:
{
  method = "dual_kawase";
  size = 10;
  strength = 2.5;
};
blur-kern = "3x3box";

backend = "glx"
dithered-present = false;
vsync = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = true;

